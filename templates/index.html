<!DOCTYPE html>
<html>
<head>
    <title>Emploi du Temps</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="container mt-5">

<h2 class="text-center mb-4">Emploi du Temps </h2>

<div class="text-center mb-3">
    <select id="filiere" class="form-select w-25 d-inline">
        <option value="1">S1 INFO</option>
        <option value="2">S1 SMA</option>
        <option value="3">S1 PC</option>
    </select>
    <button class="btn btn-success" onclick="generate()">Generate</button>
</div>
<table class="emploi">
    <thead>
        <tr>
            <th></th>
            <th>Lundi</th>
            <th>Mardi</th>
            <th>Mercredi</th>
            <th>Jeudi</th>
            <th>Vendredi</th>
            <th>Samedi</th>
        </tr>
    </thead>

    <tbody>
        <tr>
            <td class="time">08:30 - 10:00</td>
            <td id="Lundi 08:30"></td>
            <td id="Mardi 08:30"></td>
            <td id="Mercredi 08:30"></td>
            <td id="Jeudi 08:30"></td>
            <td id="Vendredi 08:30"></td>
            <td id="Samedi 08:30"></td>
        </tr>
        <tr>
            <td class="time">10:15 - 11:45</td>
            <td id="Lundi 10:15"></td>
            <td id="Mardi 10:15"></td>
            <td id="Mercredi 10:15"></td>
            <td id="Jeudi 10:15"></td>
            <td id="Vendredi 10:15"></td>
            <td id="Samedi 10:15"></td>
        </tr>
        <tr>
            <td class="time">12:00 - 13:30</td>
            <td id="Lundi 12:00"></td>
            <td id="Mardi 12:00"></td>
            <td id="Mercredi 12:00"></td>
            <td id="Jeudi 12:00"></td>
            <td id="Vendredi 12:00"></td>
            <td id="Samedi 12:00"></td>
        </tr>
        <tr>
            <td class="time">14:30 - 16:00</td>
            <td id="Lundi 14:30"></td>
            <td id="Mardi 14:30"></td>
            <td id="Mercredi 14:30"></td>
            <td id="Jeudi 14:30"></td>
            <td id="Vendredi 14:30"></td>
            <td class="disabled"></td>
        </tr>
        <tr>
            <td class="time">16:15 - 17:45</td>
            <td id="Lundi 16:15"></td>
            <td id="Mardi 16:15"></td>
            <td id="Mercredi 16:15"></td>
            <td id="Jeudi 16:15"></td>
            <td id="Vendredi 16:15"></td>
            <td class="disabled"></td>
        </tr>
    </tbody>
</table>

<script src="{{ url_for('static', filename='javascript.js') }}"></script>

</body>
</html>
